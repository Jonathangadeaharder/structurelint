version: 2

builds:
  - main: ./cmd/structurelint
    binary: structurelint
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}
      {{- end }}

checksum:
  name_template: checksums.txt

release:
  github:
    owner: VidiomTM
    name: structurelint
