version: 2

builds:
  - main: ./cmd/structurelint
    binary: structurelint
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}
      {{- end }}

brews:
  - name: structurelint
    repository:
      owner: VidiomTM
      name: homebrew-tap
      branch: main
    directory: Formula
    homepage: https://github.com/Jonathangadeaharder/structurelint
    description: Lint repository structure against a YAML schema
    test: |
      system "#{bin}/structurelint --version"
    install: |
      bin.install "structurelint"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Jonathangadeaharder
    name: structurelint
